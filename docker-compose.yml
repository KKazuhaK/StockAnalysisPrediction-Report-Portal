# Zero-clone deployment:
#   mkdir -p /opt/StockAnalysisPrediction-Report-Portal
#   cd /opt/StockAnalysisPrediction-Report-Portal
#   curl -O https://raw.githubusercontent.com/KKazuhaK/StockAnalysisPrediction-Report-Portal/main/docker-compose.yml
#   docker compose up -d
#   docker compose logs           # first run prints the random admin password
#   # To enable legacy-portal passthrough / change settings: log in and configure under Settings
#
# Update: docker compose pull && docker compose up -d

services:
  report-portal:
    # Three image channels:
    #   :latest → newest stable (recommended, default)
    #   :beta   → newest build (incl. pre-releases), always bleeding edge
    #   :vX.Y.Z → pin a specific version
    image: ghcr.io/kkazuhak/stockanalysisprediction-report-portal:latest
    container_name: report-portal
    restart: unless-stopped
    pull_policy: always

    ports:
      - "127.0.0.1:8790:8790"   # bind to localhost only; expose via host nginx reverse proxy + TLS

    volumes:
      - ./config:/app/config    # bind mount: edit config.yaml directly on the host
      - rp-data:/app/data       # SQLite + runtime data

    environment:
      # Make ./config owned by you so it's editable on the host without sudo (set your id -u / id -g)
      # PUID: "1000"
      # PGID: "1000"
      TZ: Asia/Shanghai

    # Resource cap so it doesn't contend with Dify/Ragflow on the same host
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  rp-data:
