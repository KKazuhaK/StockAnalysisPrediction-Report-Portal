# 零克隆部署：
#   mkdir -p /opt/report-portal && cd /opt/report-portal
#   curl -O https://raw.githubusercontent.com/KKazuhaK/StockAnalysisPrediction-Dify-Report-Portal/main/docker-compose.yml
#   docker compose up -d
#   # 首启后编辑 ./config/config.yaml（secret_key/账号/旧门户），再 docker compose restart
#
# 更新：docker compose pull && docker compose up -d

services:
  report-portal:
    # 镜像三档：
    #   :latest → 最新稳定版（推荐，默认）
    #   :beta   → 最新版（含预发布），始终最前沿
    #   :vX.Y.Z → 锁定某个版本
    image: ghcr.io/kkazuhak/stockanalysisprediction-dify-report-portal:latest
    container_name: report-portal
    restart: unless-stopped
    pull_policy: always

    ports:
      - "127.0.0.1:8790:8790"   # 只绑本机；对外用宿主 nginx 反代 + TLS

    volumes:
      - ./config:/app/config    # bind：宿主机直接编辑 config.yaml
      - rp-data:/app/data       # SQLite + 运行时数据

    environment:
      # 让 ./config 文件归属你本人、宿主机免 sudo 可编辑（填你的 id -u / id -g）
      # PUID: "1000"
      # PGID: "1000"
      TZ: Asia/Shanghai

    # 资源上限，别跟同机 Dify/Ragflow 抢
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  rp-data:
