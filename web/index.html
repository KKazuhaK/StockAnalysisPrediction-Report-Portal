<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/pwa-icon" />
    <meta name="theme-color" content="#1677ff" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>研报门户</title>
    <style>
      /* Boot splash: pure CSS, no JS — shows the instant the HTML paints, before the
         app bundle has even started downloading. React's first render replaces
         #root's children entirely, so this disappears on its own the moment the
         app mounts; nothing in the app needs to remove it. */
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #fff;
      }
      @media (prefers-color-scheme: dark) {
        #boot-splash {
          background: #141414;
        }
      }
      #boot-splash svg,
      #boot-splash img {
        width: 40px;
        height: 40px;
        object-fit: contain;
      }
      #boot-splash .ring {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 3px solid rgba(22, 119, 255, 0.18);
        border-top-color: #1677ff;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-splash">
        <!--RP_BOOT_LOGO_START-->
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="32" height="32" rx="7" fill="#1677ff" />
          <path
            d="M7 22 L13 14 L18 19 L25 9"
            fill="none"
            stroke="#fff"
            stroke-width="2.4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <circle cx="25" cy="9" r="2.1" fill="#fff" />
        </svg>
        <!--RP_BOOT_LOGO_END-->
        <div class="ring"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
