# Copy to config.yaml and edit as needed. config.yaml is git-ignored.
# If config.yaml is missing on first run, one is generated automatically with a
# random secret_key, so you usually do not need to copy this file.
#
# config holds INFRASTRUCTURE only: listen port / session key / database.
# Everything else is managed in the web UI and stored in the DB:
#   legacy-portal credentials, sync interval -> Settings
#   accounts (roles)                         -> Users (first run auto-creates admin, password printed in the terminal)
#   entry buttons, report types              -> the corresponding admin pages

listen: ":8790"

# Only these reverse-proxy source IPs/CIDRs may supply X-Forwarded-For. Leave empty
# for direct deployments. Configure the exact proxy address when using nginx/Caddy.
trusted_proxies: []

# Session signing key (a deployment secret, not an app setting): openssl rand -hex 32
# The auto-generated config already fills this in randomly; usually no need to change it.
secret_key: "" # Required when copying this file: generate with `openssl rand -hex 32`.

# Database: sqlite (default for the standalone binary, single file, zero deps) or postgres.
# The Docker stack defaults to Postgres via env vars (see docker-compose.yml).
db_driver: "sqlite"
db_path: "data/portal.db"
# db_driver: "postgres"
# db_dsn: "postgres://user:pass@127.0.0.1:5432/reports?sslmode=disable"
#
# Env overrides (take precedence over this file; used by the Docker image):
#   RP_LISTEN, RP_SECRET_KEY, RP_TRUSTED_PROXIES, RP_DB_DRIVER, RP_DB_DSN, RP_DB_PATH
