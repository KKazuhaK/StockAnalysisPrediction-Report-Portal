# Copy to config.yaml and edit as needed. config.yaml is git-ignored.
# If config.yaml is missing on first run, one is generated automatically
# (with a random secret_key), so you usually don't need to create it by hand.
#
# config holds INFRASTRUCTURE only: listen port / session key / database.
# Everything else is managed in the web UI and stored in the DB:
#   legacy-portal credentials, sync interval -> Settings
#   accounts (roles)                         -> Users (first run auto-creates admin, password printed in the terminal)
#   entry buttons, report types              -> the corresponding admin pages

listen: ":8790"

# Session signing key (a deployment secret, not an app setting): openssl rand -hex 32
# The auto-generated config already fills this in randomly; usually no need to change it.
secret_key: "replace-with-a-long-random-string"

# Database: sqlite (default, single file, zero deps) or postgres
db_driver: "sqlite"
db_path: "data/portal.db"
# db_driver: "postgres"
# db_dsn: "postgres://user:pass@127.0.0.1:5432/reports?sslmode=disable"
