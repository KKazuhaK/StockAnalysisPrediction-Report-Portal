{{define "content"}}
<div class="report-head"><a href="/" class="btn-ghost">{{icon "arrow-left"}} 返回列表</a></div>
<h2 class="page-h">账号管理</h2>
<p class="hint-line">config.yaml 里的账号仅首次启动时种入，之后在这里管理。不能删自己，也不能删/降级最后一个管理员。</p>

<div class="card-box">
  <table class="utable">
    <thead>
      <tr><th>用户名</th><th>角色</th><th>重置密码</th><th class="ta-r">操作</th></tr>
    </thead>
    <tbody>
    {{range .Users}}
      <tr>
        <td class="u-name">{{.Username}}{{if eq .Username $.Me}} <span class="me-tag">你</span>{{end}}</td>
        <td>
          <select name="role" form="u-{{.Username}}">
            <option value="admin" {{if .IsAdmin}}selected{{end}}>管理员</option>
            <option value="user" {{if not .IsAdmin}}selected{{end}}>普通用户</option>
          </select>
        </td>
        <td><input type="password" name="password" form="u-{{.Username}}" placeholder="留空不改" autocomplete="new-password"></td>
        <td class="ta-r u-acts">
          <form id="u-{{.Username}}" method="post" action="/manage/users/{{.Username}}/save" class="inline"><button class="btn-ghost" type="submit">保存</button></form>
          {{if ne .Username $.Me}}<form method="post" action="/manage/users/{{.Username}}/delete" class="inline"><button class="btn-ghost danger" type="submit">{{icon "trash"}} 删除</button></form>{{end}}
        </td>
      </tr>
    {{end}}
    </tbody>
  </table>
</div>

<h3 class="page-h">添加账号</h3>
<form class="add-user" method="post" action="/manage/users/add">
  <input name="username" placeholder="用户名" required autocomplete="off">
  <select name="role">
    <option value="user">普通用户</option>
    <option value="admin">管理员</option>
  </select>
  <input type="password" name="password" placeholder="密码" required autocomplete="new-password">
  <button type="submit">添加</button>
</form>
{{end}}
